name: Enrich SIO Faculty

on:
  schedule:
    # Every Sunday at 2am UTC (offset from HWSPH run at midnight)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources (leave empty for all 6)"
        required: false
        default: ""
        type: string
      faculty_ids:
        description: "Comma-separated faculty indices (leave empty for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Fetch data but don't write"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify SIO roster is seeded
        run: |
          count=$(python3 -c "
          import json, sys
          data = json.load(open('data/sio_faculty.json'))
          print(len(data.get('faculty', [])))
          ")
          if [ "$count" -eq 0 ]; then
            echo "::error::SIO faculty roster is empty. Run the 'Seed SIO Faculty' workflow first."
            exit 1
          fi
          echo "SIO roster has $count faculty members"

      - name: Run SIO enrichment
        env:
          ENRICH_DEPARTMENT: sio
          ENRICH_SOURCES: ${{ inputs.sources }}
          ENRICH_FACULTY_IDS: ${{ inputs.faculty_ids }}
          ENRICH_DRY_RUN: ${{ inputs.dry_run }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ secrets.LITELLM_API_BASE }}
          LITELLM_MODEL: ${{ secrets.LITELLM_MODEL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: python enrichment/run.py

      - name: Commit enriched data
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sio_faculty.json
          [ -f data/enrichment_log.json ] && git add data/enrichment_log.json
          git diff --staged --quiet || git commit -m "chore: enrich SIO faculty data ($(date -u +%Y-%m-%d))"
          git push
