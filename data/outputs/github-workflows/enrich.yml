name: Enrich HWSPH Faculty

on:
  schedule:
    # Every Sunday at midnight UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources (leave empty for all 4)"
        required: false
        default: ""
        type: string
      faculty_ids:
        description: "Comma-separated faculty indices (leave empty for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Fetch data but don't write"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run enrichment
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ secrets.LITELLM_API_BASE }}
          LITELLM_MODEL: ${{ secrets.LITELLM_MODEL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          ENRICH_SOURCES: ${{ inputs.sources }}
          ENRICH_FACULTY_IDS: ${{ inputs.faculty_ids }}
          ENRICH_DRY_RUN: ${{ inputs.dry_run }}
        run: python enrichment/run.py

      - name: Commit enriched data
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/faculty.json
          [ -f data/enrichment_log.json ] && git add data/enrichment_log.json
          git diff --staged --quiet || git commit -m "chore: enrich HWSPH faculty data ($(date -u +%Y-%m-%d))"
          git push
