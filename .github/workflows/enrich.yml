name: Enrich Faculty

on:
  schedule:
    # HWSPH: Every Sunday at midnight UTC
    - cron: "0 0 * * 0"
    # SIO: Every Sunday at 2am UTC
    - cron: "0 2 * * 0"
    # Jacobs: Every Sunday at 4am UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      school:
        description: "School to enrich"
        required: false
        type: choice
        options:
          - hwsph
          - sio
          - jacobs
        default: hwsph
      sources:
        description: "Comma-separated sources (leave empty for all)"
        required: false
        default: ""
        type: string
      faculty_ids:
        description: "Comma-separated faculty indices (leave empty for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Fetch data but don't write"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    # Jacobs roster is larger and needs more time; others finish within 90 min
    timeout-minutes: 120

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SCHOOL: ${{ github.event_name == 'workflow_dispatch' && inputs.school || '' }}

    steps:
      - name: Determine school for scheduled runs
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "00" ]; then
            echo "SCHOOL=hwsph" >> "$GITHUB_ENV"
          elif [ "$HOUR" = "02" ]; then
            echo "SCHOOL=sio" >> "$GITHUB_ENV"
          elif [ "$HOUR" = "04" ]; then
            echo "SCHOOL=jacobs" >> "$GITHUB_ENV"
          else
            echo "SCHOOL=hwsph" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify faculty roster is seeded
        if: env.SCHOOL == 'sio' || env.SCHOOL == 'jacobs'
        run: |
          SCHOOL="${{ env.SCHOOL }}"
          if [ "$SCHOOL" = "sio" ]; then
            DATA_FILE="data/sio_faculty.json"
          else
            DATA_FILE="data/jacobs_faculty.json"
          fi
          count=$(python3 -c "
          import json, sys
          data = json.load(open('$DATA_FILE'))
          print(len(data.get('faculty', [])))
          ")
          if [ "$count" -eq 0 ]; then
            echo "::error::${SCHOOL} faculty roster is empty. Run the 'Seed Faculty Roster' workflow first."
            exit 1
          fi
          echo "${SCHOOL} roster has $count faculty members"

      - name: Run enrichment
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ secrets.LITELLM_API_BASE }}
          LITELLM_MODEL: ${{ secrets.LITELLM_MODEL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          ENRICH_DEPARTMENT: ${{ env.SCHOOL != 'hwsph' && env.SCHOOL || '' }}
          ENRICH_SOURCES: ${{ inputs.sources }}
          ENRICH_FACULTY_IDS: ${{ inputs.faculty_ids }}
          ENRICH_DRY_RUN: ${{ inputs.dry_run }}
        run: python enrichment/run.py

      - name: Commit enriched data
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/faculty.json data/sio_faculty.json data/jacobs_faculty.json
          git diff --staged --quiet || git commit -m "chore: enrich ${{ env.SCHOOL || 'hwsph' }} faculty data ($(date -u +%Y-%m-%d))"
          git pull --rebase origin main
          git push
