name: Enrich HWSPH Faculty

on:
  schedule:
    # HWSPH: Every Sunday at midnight UTC
    - cron: "0 0 * * 0"
    # SIO: Every Sunday at 2am UTC (offset to avoid overlap)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      department:
        description: "Department to enrich"
        required: false
        type: choice
        options:
          - hwsph
          - sio
        default: hwsph
      sources:
        description: "Comma-separated sources (leave empty for all)"
        required: false
        default: ""
        type: string
      faculty_ids:
        description: "Comma-separated faculty indices (leave empty for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Fetch data but don't write"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    # For scheduled runs, use the cron time to determine department
    # 00:00 UTC = HWSPH, 02:00 UTC = SIO
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEPT: ${{ github.event_name == 'workflow_dispatch' && inputs.department || '' }}

    steps:
      - name: Determine department for scheduled runs
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "02" ]; then
            echo "DEPT=sio" >> "$GITHUB_ENV"
          else
            echo "DEPT=hwsph" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run enrichment
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ secrets.LITELLM_API_BASE }}
          LITELLM_MODEL: ${{ secrets.LITELLM_MODEL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          ENRICH_DEPARTMENT: ${{ env.DEPT != 'hwsph' && env.DEPT || '' }}
          ENRICH_SOURCES: ${{ inputs.sources }}
          ENRICH_FACULTY_IDS: ${{ inputs.faculty_ids }}
          ENRICH_DRY_RUN: ${{ inputs.dry_run }}
        run: python enrichment/run.py

      - name: Commit enriched data
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/faculty.json data/sio_faculty.json data/jacobs_faculty.json
          [ -f data/enrichment_log.json ] && git add data/enrichment_log.json
          git diff --staged --quiet || git commit -m "chore: enrich ${{ env.DEPT || 'hwsph' }} faculty data ($(date -u +%Y-%m-%d))"
          git push
