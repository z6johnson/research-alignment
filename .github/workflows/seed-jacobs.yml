name: Seed Jacobs Faculty

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Discovery strategy"
        required: false
        type: choice
        options:
          - all
          - directory
          - catalog
        default: all
      dry_run:
        description: "Preview without writing"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed Jacobs faculty roster
        run: |
          args="--strategy ${{ inputs.strategy }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python enrichment/seed_jacobs.py $args

      - name: Commit seeded data
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jacobs_faculty.json
          git diff --staged --quiet || git commit -m "chore: seed Jacobs faculty roster ($(date -u +%Y-%m-%d))"
          git push
